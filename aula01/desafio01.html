<body>
    <h1> Integrando os recursoso de interação  </h1>
    <hr>
    <script>
        let num1 = Number(window.prompt("Digite o primeiro número:"));
        let num2 = Number(window.prompt("Digite o segundo número:"));

        let resposta = window.confirm("Clique em OK para SOMAR ou Cancelar para SUBTRAIR");

        if (resposta) {
            window.alert("Resultado: " + (num1 + num2));
        } else {
            window.alert("Resultado: " + (num1 - num2));
        }
    </script>
