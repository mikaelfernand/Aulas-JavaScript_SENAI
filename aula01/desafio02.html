</head>
<body>

    <h1>Resultado da Operação</h1>
    <p id="resultado"></p>

    <script>
        let num1 = Number(prompt("Digite o primeiro número:"));
        let num2 = Number(prompt("Digite o segundo número:"));

        let operacao = prompt("Digite '+' para somar ou '-' para subtrair:");

        let resultado;

        if (operacao === "+") {
            resultado = num1 + num2;
            document.getElementById("resultado").innerHTML =
                `${num1} + ${num2} = ${resultado}`;
        } 
        else if (operacao === "-") {
            resultado = num1 - num2;
            document.getElementById("resultado").innerHTML =
                `${num1} - ${num2} = ${resultado}`;
        } 
        else {
            document.getElementById("resultado").innerHTML =
                "Operação inválida!";
        }
    </script>

</body>
</html>
