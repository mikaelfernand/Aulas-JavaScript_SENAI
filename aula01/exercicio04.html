<body>
    <h1> Integrando os recursoso de interação  </h1>
    <hr>
    <script> 

        window.alert(" seja bem-vindo ao site");
        let nome = window.prompt("QUAL È SEU NOME? ");
        window.alert(nome);
        console.log(nome);
        let resposta = window.confirm("Voce deseja sair da pagina? ");

        if(resposta==true){
            setTimeout(() => {
                window.open("Index.html");
            }, 3000);

        }else{
            window.confirm(nome +", Voce vai continuar nessas pagina! ");
        }
    </script>
