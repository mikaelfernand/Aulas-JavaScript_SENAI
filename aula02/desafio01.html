<body>

    <h1> MANIPULANDO ELEMENTOS (TAGS)<mark> DO HTML ATRÁVES DO JS</mark></h1>
    <hr>

    <div>

        <p> Estamos aprendendo</p>
        <hr>
        <p>Aprender é muito legal</p>
        <p>e para ajudar o aprendizado, é PRECISO praticar e exercitar</p>

    </div>

    <script>

        const tags_p = document.getElementsByTagName('p');
        console.log("MINHAS TAGS <p>", tags_p)
        let tags_p_1 = tags_p[0]
        let tags_p_2 = tags_p[1]

        tags_p_1.style.backgroundColor="green";
        tags_p_1.style.color="yellow";
        tags_p_1.style.textAlign="center";
        tags_p_2.style.textAlign="center";


        const tags_div = document.getElementsByTagName('div');
        console.log("MINHAS TAGS <div>", tags_div)
        let tags_div_1 = tags_div[0]

        tags_div_1.style.backgroundColor="red";

        const tags_body = document.getElementsByTagName('body');
        console.log("MINHAS TAGS <body>", tags_body)
        let tags_body_1 = tags_body[0]

        tags_body_1.style.backgroundColor="blue";

    </script>
    
</body>
