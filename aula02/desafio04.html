<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/jpg" href="img/trico1.jpg">
    <title>Desafio 4 - Troca de imagem</title>
</head>
<body>
    <h1><mark>DESAFIO 4</mark> ALTERANDO IMAGEM VIA JS</h1>
    <hr>
    <div>
        <img id="imagemPrincipal" src="img/trico1.jpg" alt="Imagem do Desafio" width="300" title="Trico1">
        <button onclick="trocarImagem()">Trocar Imagem</button>
    </div>
    <hr>

    <script>
        const imagem = document.getElementById('imagemPrincipal');

        function trocarImagem() {

            if (imagem.title=="Trico1") {
                imagem.title="Trico2";
                imagem.src = 'img/trico2.jpg';                
            } else {
                imagem.src = 'img/trico1.jpg';
                imagem.title="Trico1";
            }
        }
    </script>
</body>
</html>
