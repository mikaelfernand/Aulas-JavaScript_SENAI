<body>
    
    <h1> MANIPULANDO ELEMENTOS (TAGS)<mark> DO HTML ATRÁVES DO JS</mark></h1>
    <hr>

        <div>
            <img id="imagemPrincipal" src="img/chocado.jpg" alt="Imagem do Desafio" width="300" title="chocado">
            <button onclick="trocarImagem()">Trocar Imagem</button>
        </div>
    <hr>
    


    <script>
        const imagem = document.getElementById('imagemPrincipal');

        function trocarImagem() {

            if (imagem.title=="chocado") {
                imagem.title="louco";
                imagem.src = 'img/chocado.jpg';                
            } else {
                imagem.src = 'img/louco.jpg';
                imagem.title="chocado";
            }
        }
    </script>
