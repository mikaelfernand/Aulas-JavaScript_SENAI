    <h1> TROCAR AS IMAGENS </h1>

    <input type="button" onclick="bravo()" value="chocado">
    <input type="button" onclick="triste()" value="louco">
    <img src="angry.jpg.png" id="rosto" style="width: 350px;">

    <script>
        function chocado(){
            const tag_img = document.getElementById('rosto');
            tag_img.src = "chocado.jpg.jpg";
            tag_img.title = "chocado";
        }
        function louco(){
            const tag_img = document.getElementById('rosto');

        }
